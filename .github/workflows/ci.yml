name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Run Tests (MATLAB)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a
          products: |
            Statistics_and_Machine_Learning_Toolbox
            Image_Processing_Toolbox

      - name: Hide Octave shims from MATLAB test runner
        run: mv utils/octave_compat .octave_compat

      - name: Run test suite
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: core;utils
          test-results-junit: results/test-results.xml
          code-coverage-cobertura: results/coverage.xml
          select-by-folder: tests

      - name: Restore Octave shims
        if: always()
        run: mv .octave_compat utils/octave_compat

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: MATLAB Test Results
          path: results/test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/

  octave-test:
    name: Smoke Test (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Run Octave compatibility test
        run: |
          octave --eval "addpath('core','utils','utils/octave_compat','dependencies','tests'); test_octave;"
