name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Run Tests (MATLAB, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a
          products: |
            Statistics_and_Machine_Learning_Toolbox
            Image_Processing_Toolbox

      - name: Hide Octave shims from MATLAB test runner (Unix)
        if: runner.os != 'Windows'
        run: mv utils/octave_compat .octave_compat

      - name: Hide Octave shims from MATLAB test runner (Windows)
        if: runner.os == 'Windows'
        run: Move-Item utils\octave_compat .octave_compat
        shell: pwsh

      - name: Run test suite
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: core;utils
          test-results-junit: results/test-results.xml
          code-coverage-cobertura: results/coverage.xml
          select-by-folder: tests

      - name: Restore Octave shims (Unix)
        if: always() && runner.os != 'Windows'
        run: mv .octave_compat utils/octave_compat

      - name: Restore Octave shims (Windows)
        if: always() && runner.os == 'Windows'
        run: Move-Item .octave_compat utils\octave_compat
        shell: pwsh

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: MATLAB Test Results (${{ matrix.os }})
          path: results/test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: results/

  python-analysis-test:
    name: Python Analysis Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r analysis/requirements.txt

      - name: Run pytest
        run: python -m pytest analysis/tests/ -v --tb=short

  octave-test:
    name: Smoke Test (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Run Octave compatibility test
        run: |
          octave --eval "addpath('core','utils','.octave_compat','dependencies','tests'); test_octave;"
