name: CI

on:
  push:
    branches: [v2.1-dev, main]
  pull_request:
    branches: [v2.1-dev, main]

jobs:
  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r analysis/requirements.txt
      - run: python -m pytest analysis/tests/ -q --tb=short

  matlab-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for common MATLAB syntax errors
        run: |
          # Check for any .m files with null bytes (binary corruption)
          errors=0

          while IFS= read -r -d '' file; do
            if grep -qP '\x00' "$file"; then
              echo "Error: Null bytes in $file"
              errors=$((errors + 1))
            fi
          done < <(find pipeline -name "*.m" -not -path "*/dependencies/*" -print0)

          if [ $errors -gt 0 ]; then
            echo "$errors file(s) with issues found"
            exit 1
          fi
          echo "MATLAB syntax check passed"
