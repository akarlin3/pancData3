name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (MATLAB)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a
          products: |
            Statistics_and_Machine_Learning_Toolbox
            Image_Processing_Toolbox

      - name: Run test suite
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: core;utils
          test-results-junit: results/test-results.xml
          code-coverage-cobertura: results/coverage.xml
          select-by-folder: tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/

  octave-test:
    name: Smoke Test (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Run Octave compatibility test
        run: |
          octave --eval "addpath('core','utils','utils/octave_compat','dependencies','tests'); test_octave;"
