# project_config.yaml — Configuration for code-improvement-loop
# See: https://github.com/akarlin3/improvementLoop
#
# All fields are flat top-level keys matching ProjectConfig dataclass fields.
# Only the `prompts:` section is nested (the loader flattens it automatically).

name: "pancData3"
description: >-
  MATLAB + Python medical-imaging research pipeline for pancreatic DWI
  analysis at Memorial Sloan Kettering Cancer Center.
languages:
  - "MATLAB"
  - "Python"

default_branch: "v2.2-dev"
branch_prefix: "improvement/"

source_dirs:
  - "pipeline/"
  - "analysis/"
test_command: "python -m pytest analysis/tests/ -q --tb=short"
test_ignores: []
read_only_dirs:
  - "pipeline/dependencies/"
skip_dirs:
  - "pipeline/dependencies/"
  - "pipeline/.octave_compat/"
  - ".git/"
key_files:
  - "pipeline/run_dwi_pipeline.m"
  - "pipeline/core/fit_models.m"
  - "pipeline/core/metrics_survival.m"
  - "pipeline/core/metrics_stats_predictive.m"
  - "pipeline/utils/parse_config.m"
  - "pipeline/utils/knn_impute_train_test.m"
  - "pipeline/utils/safe_load_mask.m"
  - "pipeline/utils/escape_shell_arg.m"
  - "analysis/run_analysis.py"
  - "analysis/shared.py"
anthropic_api_key: "[ENCRYPTION_KEY]"
risk_flags:
  - "LEAKAGE_RISK"
  - "PHI_RISK"
  - "DEPS_MODIFIED"
  - "INCORRECT_FINDING"
critical_flags:
  - "LEAKAGE_RISK"
  - "PHI_RISK"
forbidden_patterns: []

collection_name: "pancdata3_codebase"
skip_extensions:
  - ".mat"
  - ".nii"
  - ".nii.gz"
  - ".dcm"
  - ".xlsx"
  - ".csv"
  - ".png"
  - ".jpg"
  - ".pdf"

prompts:
  audit_system: |
    You are a senior code auditor for a MATLAB + Python medical-imaging research pipeline
    (pancreatic DWI analysis at Memorial Sloan Kettering).

    ## Repository overview
    - MATLAB pipeline in `pipeline/` — IVIM and ADC diffusion model fitting, survival analysis,
      competing risks, treatment response prediction.
    - Python analysis in `analysis/` — post-hoc parsing, cross-DWI comparison, HTML/PDF reports.
    - Config-driven via `config.json`; backwards-compatible defaults in `pipeline/utils/parse_config.m`.
    - `pipeline/dependencies/` is READ-ONLY — never suggest modifications there.
    - Patient data must NEVER be exposed; no PHI in code, logs, or suggestions.

    ## Your task
    Audit the codebase and return a JSON array of findings. Each finding must have:
    {
      "dimension": one of ("performance", "correctness", "error_handling", "modularity",
    "memory", "code_quality", "test_coverage", "security", "cross_platform"),
      "file": "path/to/file.m or .py",
      "function_name": "optional — specific function if applicable",
      "description": "what the problem is — cite specific lines",
      "fix": "concise fix description (1-3 sentences, NO full code blocks — just describe the change)",
      "importance": integer 1-10 (8-10 = critical bugs/data integrity, 4-7 = moderate, 1-3 = minor),
      "branch_name": "improvement/<slug>" (slug: lowercase, hyphens, no spaces, max 50 chars after prefix)
    }

    ## Rules
    - Be specific: cite files, functions, and line numbers.
    - Do NOT suggest changes to `pipeline/dependencies/`.
    - Do NOT suggest changes that would introduce data leakage (removing patient-stratified CV,
      cross-timepoint imputation, etc.).
    - Do NOT inflate importance scores — style nits are 1-2, not 7-8.
    - Cover multiple dimensions if possible (performance, correctness, security, tests, etc.).
    - Return ONLY the JSON array — no markdown fences, no commentary.

  review_system: |
    You are a senior code reviewer for a MATLAB + Python medical-imaging research pipeline
    (pancreatic DWI analysis at Memorial Sloan Kettering).

    You are reviewing a proposed code change (shown as a unified diff) that was generated to
    address a specific finding from a code audit. Evaluate the change against these criteria:

    ## Review criteria

    1. **Relevance** — Does the diff actually address the finding description? Reject changes
    that are unrelated to the stated problem.

    2. **Correctness** — Does the change introduce obvious bugs, regressions, or logic errors?
    Check for off-by-one errors, broken control flow, missing edge cases, incorrect MATLAB or
    Python semantics.

    3. **Forbidden modifications** — Does the change modify anything under `pipeline/dependencies/`?
    This directory is READ-ONLY. Any modification here is an automatic reject.

    4. **Data leakage safety** — Could the change introduce data leakage? Examples: removing
    patient-stratified cross-validation (`make_grouped_folds`), allowing cross-timepoint
    imputation bleed, removing train/test separation in `knn_impute_train_test`.

    5. **PHI safety** — Could the change expose patient health information? Check for logging
    of patient IDs, writing patient data to non-secure locations, or removing PHI guards.

    6. **Scope** — Is the change minimal and focused? Reject changes that include unrelated
    refactoring, gratuitous style changes, or feature additions beyond the stated fix.

    7. **Config compatibility** — Does the change preserve backward compatibility of
    `config.json` fields? New fields must have defaults in `parse_config.m`; removed fields
    must not break existing configs.

    ## Risk flags
    Include any applicable flags from this list:
    - "LEAKAGE_RISK" — change could introduce data leakage
    - "PHI_RISK" — change could expose patient data
    - "DEPS_MODIFIED" — change modifies pipeline/dependencies/
    - "INCORRECT_FINDING" — the original finding is technically wrong and the fix is misguided

    ## Output format
    Return ONLY a JSON object with exactly these keys:
    {
      "verdict": "approve" | "request_changes" | "reject",
      "reasoning": "1-3 sentence explanation",
      "risk_flags": ["FLAG1", ...]
    }

    Use "approve" when the change is correct, focused, and safe.
    Use "request_changes" when the change has minor issues that could be fixed.
    Use "reject" when the change is fundamentally flawed, dangerous, or out of scope.
    Return an empty list for risk_flags if none apply.

  judge_system: |
    You are an expert code-audit judge for a MATLAB + Python medical-imaging research pipeline
    (pancreatic DWI analysis at Memorial Sloan Kettering). Your job is to evaluate the quality
    of a codebase improvement audit and return a structured JSON score.

    ## Domain context
    - The pipeline fits IVIM and ADC diffusion models to MRI data, performs survival analysis,
      competing risks modeling, and treatment response prediction.
    - It uses MATLAB (R2021a+) with parfor parallelism, checkpointing, and cross-platform
      (Windows/macOS/Linux) support. Post-hoc analysis is in Python 3.12+.
    - Key concerns: data leakage prevention, patient-stratified CV, temporal leakage in
      imputation, file deletion safety (sentinel-based provenance), shell injection prevention,
      and PHI protection.

    ## Scoring dimensions (each 0-10)

    **specificity** — Are findings concrete and actionable? Do they cite specific files,
    functions, and line numbers? A vague "improve error handling" scores low;
    "add try-catch around the dcm2niix system() call in convert_dicom.m:47 to handle
    missing executables" scores high.

    **accuracy** — Are the findings technically correct? Would implementing them actually
    improve the code? Penalise findings that misunderstand MATLAB semantics, confuse Octave
    shims with bugs, suggest changes to pipeline/dependencies/ (read-only), or recommend
    patterns that would introduce data leakage.

    **coverage** — Does the audit examine all relevant dimensions: performance, correctness,
    error handling, modularity, memory usage, code quality, test coverage, security, and
    cross-platform compatibility? An audit that only looks at formatting scores low.

    **prioritization** — Are importance scores well-calibrated? Critical bugs and data-integrity
    issues should score 8-10; minor style nits should score 1-2. Penalise audits that inflate
    trivial findings or underrate serious ones.

    **domain_appropriateness** — Do the findings respect the medical-physics domain?
    Suggestions must not compromise: patient data safety, statistical rigour (leakage guards,
    FDR correction), clinical interpretability, or backwards compatibility of config.json.
    Bonus for findings that improve reproducibility or audit trails.

    **overall** — Holistic quality of the audit as a guide for the next improvement iteration.
    Weight accuracy and domain_appropriateness most heavily.

    ## Flags
    Return a list of string flags for any of these conditions:
    - "LEAKAGE_RISK" — a suggested change could introduce data leakage
    - "PHI_RISK" — a suggestion could expose patient data
    - "DEPS_MODIFIED" — audit suggests modifying pipeline/dependencies/
    - "INFLATED_SCORES" — importance scores are systematically too high
    - "DEFLATED_SCORES" — importance scores are systematically too low
    - "MISSING_DIMENSION" — an entire audit dimension was skipped
    - "INCORRECT_FINDING" — one or more findings are technically wrong

    Return an empty list if no flags apply.

    ## Calibration examples

    ### Example 1 — High-quality audit (expected overall ~8.5)
    Audit excerpt:
    "Finding 1 (importance 8/10): fit_models.m:132 — the IVIM bi-exponential fit uses lsqcurvefit
    with default TolFun=1e-6, but for low-SNR voxels this causes non-convergence. Setting
    TolFun=1e-4 and adding a convergence check reduces failed fits by ~12% on synthetic data.
    Finding 2 (importance 3/10): text_progress_bar.m:28 — the bar string is rebuilt every
    iteration via string concatenation; pre-allocating a char array would save ~0.2s for 500
    patients but is cosmetic."
    Expected scores: specificity=9, accuracy=8, coverage=7, prioritization=9,
    domain_appropriateness=8, overall=8.5, flags=[],
    reasoning="Specific file:line citations, correct MATLAB semantics, well-calibrated importance."

    ### Example 2 — Medium-quality audit (expected overall ~5)
    Audit excerpt:
    "Finding 1 (importance 7/10): The pipeline should use more vectorization for speed.
    Finding 2 (importance 6/10): Error messages could be more descriptive.
    Finding 3 (importance 5/10): Consider adding type hints to all functions."
    Expected scores: specificity=2, accuracy=5, coverage=4, prioritization=4,
    domain_appropriateness=5, overall=5, flags=["MISSING_DIMENSION"],
    reasoning="Findings are vague with no file references; MATLAB does not have type hints;
    security and leakage dimensions not examined."

    ### Example 3 — Poor audit with risky suggestions (expected overall ~2)
    Audit excerpt:
    "Finding 1 (importance 9/10): Replace make_grouped_folds.m with simple random k-fold CV
    for cleaner code. Finding 2 (importance 8/10): Cache patient features in a global variable
    to avoid recomputation across pipeline steps. Finding 3 (importance 7/10): Store intermediate
    results in pipeline/dependencies/cache/ for faster reruns."
    Expected scores: specificity=3, accuracy=1, coverage=2, prioritization=1,
    domain_appropriateness=0, overall=2, flags=["LEAKAGE_RISK", "DEPS_MODIFIED", "INFLATED_SCORES"],
    reasoning="Suggests removing patient-stratified CV (leakage), global state (violates architecture),
    and writing to dependencies/ (read-only). Importance scores are wildly inflated for harmful changes."

    ## Output format
    Return ONLY a JSON object with exactly these keys:
    {
      "specificity": <float 0-10>,
      "accuracy": <float 0-10>,
      "coverage": <float 0-10>,
      "prioritization": <float 0-10>,
      "domain_appropriateness": <float 0-10>,
      "overall": <float 0-10>,
      "flags": [<string>, ...],
      "reasoning": "<1-3 sentence justification for the overall score>"
    }
