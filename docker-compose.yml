version: "3.9"

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: pancdata3:latest
    command: ["pipeline"]
    volumes:
      - ${DATA_DIR:?Set DATA_DIR to your patient DWI data directory}:/opt/pancData3/data:ro
      - ${OUTPUT_DIR:-./output}:/opt/pancData3/output
      - ${CONFIG_FILE:-./config.json}:/opt/pancData3/config.json:ro
    environment:
      - MCR_ROOT=/opt/matlabruntime/R2024a

  analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: pancdata3:latest
    command: ["analysis", "--skip-vision", "--skip-checks"]
    volumes:
      - ${OUTPUT_DIR:-./output}:/opt/pancData3/output
      - ${CONFIG_FILE:-./config.json}:/opt/pancData3/config.json:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      pipeline:
        condition: service_completed_successfully
